# =============================================================================
# 示例 Secret（请勿直接 apply 到生产）
# =============================================================================
# 用法：
#   1. 复制为 secrets.yaml 并填入真实强密钥（secrets.yaml 已在 .gitignore）
#   2. kubectl apply -f secrets.yaml -n agentpulse
# 或在 overlays/production 使用 secretGenerator + secrets.env
#
# 生产必须：
#   - 密码长度与复杂度符合组织策略（禁止 changeme）
#   - api-keys 符合后端校验（>=16 字符，推荐 ap- 前缀）
#   - 使用 SealedSecrets / ExternalSecrets / SOPS 管理，勿提交明文
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: agentpulse-secrets
  namespace: agentpulse
type: Opaque
stringData:
  postgres-password: "REPLACE_WITH_STRONG_POSTGRES_PASSWORD"
  clickhouse-password: "REPLACE_WITH_STRONG_CLICKHOUSE_PASSWORD"
  chroma-token: "REPLACE_WITH_STRONG_CHROMA_TOKEN"
  api-keys: "ap-REPLACE_WITH_PRODUCTION_API_KEY_01"
  judge-api-key: "sk-REPLACE_WITH_JUDGE_API_KEY"
