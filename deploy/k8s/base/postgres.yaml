apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agentpulse-postgres
  namespace: agentpulse
spec:
  serviceName: agentpulse-postgres
  replicas: 1
  selector:
    matchLabels:
      app: agentpulse-postgres
  template:
    metadata:
      labels:
        app: agentpulse-postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: agentpulse
            - name: POSTGRES_USER
              value: agentpulse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentpulse-secrets
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "agentpulse"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "agentpulse"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: agentpulse-postgres
  namespace: agentpulse
spec:
  selector:
    app: agentpulse-postgres
  ports:
    - port: 5432
      targetPort: 5432
