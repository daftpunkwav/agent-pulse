apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agentpulse-chroma-data
  namespace: agentpulse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentpulse-chroma
  namespace: agentpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentpulse-chroma
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: agentpulse-chroma
    spec:
      containers:
        - name: chroma
          image: chromadb/chroma:0.5.23
          ports:
            - containerPort: 8000
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: ANONYMIZED_TELEMETRY
              value: "False"
            - name: CHROMA_SERVER_AUTHN_PROVIDER
              value: chromadb.auth.token_authn.TokenAuthenticationServerProvider
            - name: CHROMA_SERVER_AUTHN_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: agentpulse-secrets
                  key: chroma-token
          volumeMounts:
            - name: data
              mountPath: /chroma/chroma
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Token 鉴权下 heartbeat 需带 Authorization；使用 exec + 环境变量
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  python -c "import os,urllib.request; r=urllib.request.Request('http://127.0.0.1:8000/api/v1/heartbeat',headers={'Authorization':'Bearer '+os.environ['CHROMA_SERVER_AUTHN_CREDENTIALS']}); urllib.request.urlopen(r,timeout=5)"
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  python -c "import os,urllib.request; r=urllib.request.Request('http://127.0.0.1:8000/api/v1/heartbeat',headers={'Authorization':'Bearer '+os.environ['CHROMA_SERVER_AUTHN_CREDENTIALS']}); urllib.request.urlopen(r,timeout=5)"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: agentpulse-chroma-data
---
apiVersion: v1
kind: Service
metadata:
  name: agentpulse-chroma
  namespace: agentpulse
spec:
  selector:
    app: agentpulse-chroma
  ports:
    - port: 8000
      targetPort: 8000
