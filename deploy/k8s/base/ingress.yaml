apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentpulse-ingress
  namespace: agentpulse
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: agentpulse.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentpulse-web
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agentpulse-backend
                port:
                  number: 8080
