apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentpulse-default-deny-ingress
  namespace: agentpulse
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentpulse
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
