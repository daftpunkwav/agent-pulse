apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentpulse-web
  namespace: agentpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentpulse-web
  template:
    metadata:
      labels:
        app: agentpulse-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: web
          image: agentpulse/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_API_BASE
              value: http://agentpulse-backend:8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
---
apiVersion: v1
kind: Service
metadata:
  name: agentpulse-web
  namespace: agentpulse
spec:
  selector:
    app: agentpulse-web
  ports:
    - port: 3000
      targetPort: 3000
