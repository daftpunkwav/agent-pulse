# =============================================================================
# AgentPulse 本地开发基础设施
# =============================================================================
# 启动：docker compose up -d
# 停止：docker compose down
# 重置：docker compose down -v
#
# 安全说明：
#   - 所有端口绑定 127.0.0.1，避免意外暴露到公网
#   - 密码通过 .env 文件注入，禁止使用默认 changeme 上生产
# =============================================================================

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: agentpulse-clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9009:9009"
    environment:
      CLICKHOUSE_DB: agentpulse
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./init/clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- 'http://localhost:8123/?query=SELECT%20count()%20FROM%20agentpulse.agent_spans' || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: agentpulse-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: agentpulse
      POSTGRES_USER: ${POSTGRES_USER:-agentpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agentpulse} -d agentpulse && psql -U ${POSTGRES_USER:-agentpulse} -d agentpulse -c 'SELECT 1 FROM evaluations LIMIT 0' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: agentpulse-chroma
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      ANONYMIZED_TELEMETRY: "False"
      IS_PERSISTENT: "TRUE"
      CHROMA_SERVER_AUTHN_CREDENTIALS: ${CHROMA_AUTH_TOKEN:?CHROMA_AUTH_TOKEN is required}
      CHROMA_SERVER_AUTHN_PROVIDER: chromadb.auth.token_authn.TokenAuthenticationServerProvider
    volumes:
      - ./data/chroma:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  default:
    name: agentpulse-net
