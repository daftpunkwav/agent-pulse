# =============================================================================
# AgentPulse 本地开发基础设施
# =============================================================================
# 启动所有依赖服务：
#   docker compose up -d
#
# 停止：
#   docker compose down
#
# 重置数据（删除所有持久化数据）：
#   docker compose down -v
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # ClickHouse - Trace 存储（OLAP）
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: agentpulse-clickhouse
    restart: unless-stopped
    ports:
      - "9000:9000"     # Native protocol
      - "8123:8123"     # HTTP interface
      - "9009:9009"     # Interserver replication
    environment:
      CLICKHOUSE_DB: agentpulse
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./init/clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL - 元数据存储
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: agentpulse-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agentpulse
      POSTGRES_USER: agentpulse
      POSTGRES_PASSWORD: changeme
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpulse -d agentpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Chroma - 向量存储（失败聚类）
  # ---------------------------------------------------------------------------
  chroma:
    image: chromadb/chroma:latest
    container_name: agentpulse-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ANONYMIZED_TELEMETRY: "False"
      IS_PERSISTENT: "TRUE"
    volumes:
      - ./data/chroma:/chroma/chroma

  # ---------------------------------------------------------------------------
  # (可选) OTEL Collector - 标准 OTLP 入口
  # 如果想直接对接 OTel 标准生态，可启用此服务
  # ---------------------------------------------------------------------------
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:0.96.0
  #   container_name: agentpulse-otel-collector
  #   command: ["--config=/etc/otel-collector-config.yaml"]
  #   volumes:
  #     - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
  #   ports:
  #     - "4317:4317"   # OTLP gRPC
  #     - "4318:4318"   # OTLP HTTP

# =============================================================================
# 网络 - 所有服务在默认 bridge 网络即可互通
# =============================================================================
networks:
  default:
    name: agentpulse-net